<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="3; url=/TestProductWebsite/anotherpage.html">
  <script>
    setTimeout(function () {
      window.location.replace("/TestProductWebsite/anotherpage.html");
    }, 3000);
  </script>
</head>
<body>
  <p>Redirecting to product page in 3 seconds...</p>
  <p>If you are not redirected, <a href="/TestProductWebsite/anotherpage.html">open the product page</a>.</p>
</body>
</html>
